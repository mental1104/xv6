name: Refactor FS readability

on:
  push:
    branches:
      - concept/40-fs-call-log-readability

permissions:
  contents: write

jobs:
  refactor-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: concept/40-fs-call-log-readability

      - name: Apply focused refactor
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              content = file_path.read_text()
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one matching block, found {count}")
              file_path.write_text(content.replace(old, new, 1))

          old_sys_open = '''uint64
          sys_open(void)
          {
            char path[MAXPATH];
            int fd, omode;
            struct file *f;
            struct inode *ip;
            int n;

            if((n = argstr(0, path, MAXPATH)) < 0 || argint(1, &omode) < 0)
              return -1;

            begin_op();

            if(omode & O_CREATE){
              ip = create(path, T_FILE, 0, 0);
              if(ip == 0){
                end_op();
                return -1;
              }
            } else {
              if((ip = namei(path)) == 0){
                end_op();
                return -1;
              }

              if (!(omode & O_NOFOLLOW)) {
                int cnt = MAXSYMLINK;
                int len = 0;
                while (cnt-- > 0) {
                  ilock(ip);
                  if (ip->type == T_SYMLINK) {
                    if (readi(ip, 0, (uint64)&len, 0, sizeof(len)) < sizeof(len)) {
                      iunlockput(ip);
                      end_op();
                      return -1;
                    }
                    if (readi(ip, 0, (uint64)path, sizeof(len), len + 1) < len + 1) {
                      iunlockput(ip);
                      end_op();
                      return -1;
                    }
                    iunlockput(ip);
                  } else {
                    iunlock(ip);
                    break;
                  }
                  if((ip = namei(path)) == 0){
                    end_op();
                    return -1;
                  }
                }
                if (cnt <= 0) {
                  end_op();
                  return -1;
                }
              }
              ilock(ip);
              if(ip->type == T_DIR && omode != O_RDONLY){
                iunlockput(ip);
                end_op();
                return -1;
              }
            }

            if(ip->type == T_DEVICE && (ip->major < 0 || ip->major >= NDEV)){
              iunlockput(ip);
              end_op();
              return -1;
            }

            if((f = filealloc()) == 0 || (fd = fdalloc(f)) < 0){
              if(f)
                fileclose(f);
              iunlockput(ip);
              end_op();
              return -1;
            }

            if(ip->type == T_DEVICE){
              f->type = FD_DEVICE;
              f->major = ip->major;
            } else {
              f->type = FD_INODE;
              f->off = 0;
            }
            f->ip = ip;
            f->readable = !(omode & O_WRONLY);
            f->writable = (omode & O_WRONLY) || (omode & O_RDWR);

            if((omode & O_TRUNC) && ip->type == T_FILE){
              itrunc(ip);
            }

            iunlock(ip);
            end_op();

            return fd;
          }
          '''

          new_sys_open = '''// Caller must hold ip's inode lock.
          static int
          read_symlink_target_locked(struct inode *ip, char *path)
          {
            int len;

            if(readi(ip, 0, (uint64)&len, 0, sizeof(len)) < sizeof(len))
              return -1;
            if(readi(ip, 0, (uint64)path, sizeof(len), len + 1) < len + 1)
              return -1;

            return 0;
          }

          // Follow symbolic links and return an unlocked inode reference.
          static struct inode*
          follow_symlinks(struct inode *ip, char *path)
          {
            int remaining = MAXSYMLINK;

            while(remaining-- > 0){
              ilock(ip);

              if(ip->type != T_SYMLINK){
                iunlock(ip);
                break;
              }

              if(read_symlink_target_locked(ip, path) < 0){
                iunlockput(ip);
                return 0;
              }

              iunlockput(ip);
              ip = namei(path);
              if(ip == 0)
                return 0;
            }

            if(remaining <= 0){
              iput(ip);
              return 0;
            }

            return ip;
          }

          // Return the inode locked on success.
          static struct inode*
          open_inode_locked(char *path, int omode)
          {
            struct inode *ip;

            if(omode & O_CREATE)
              return create(path, T_FILE, 0, 0);

            ip = namei(path);
            if(ip == 0)
              return 0;

            if((omode & O_NOFOLLOW) == 0){
              ip = follow_symlinks(ip, path);
              if(ip == 0)
                return 0;
            }

            ilock(ip);
            return ip;
          }

          // Caller must hold ip's inode lock.
          static int
          can_open_inode_locked(struct inode *ip, int omode)
          {
            if(ip->type == T_DIR && omode != O_RDONLY)
              return 0;
            if(ip->type == T_DEVICE && (ip->major < 0 || ip->major >= NDEV))
              return 0;

            return 1;
          }

          static int
          alloc_open_file(struct file **out)
          {
            struct file *f;
            int fd;

            f = filealloc();
            if(f == 0)
              return -1;

            fd = fdalloc(f);
            if(fd < 0){
              fileclose(f);
              return -1;
            }

            *out = f;
            return fd;
          }

          // Caller must hold ip's inode lock.
          static void
          init_open_file(struct file *f, struct inode *ip, int omode)
          {
            if(ip->type == T_DEVICE){
              f->type = FD_DEVICE;
              f->major = ip->major;
            } else {
              f->type = FD_INODE;
              f->off = 0;
            }

            f->ip = ip;
            f->readable = !(omode & O_WRONLY);
            f->writable = (omode & O_WRONLY) || (omode & O_RDWR);
          }

          uint64
          sys_open(void)
          {
            char path[MAXPATH];
            int fd, omode;
            struct file *f;
            struct inode *ip;

            if(argstr(0, path, MAXPATH) < 0 || argint(1, &omode) < 0)
              return -1;

            begin_op();

            ip = open_inode_locked(path, omode);
            if(ip == 0)
              goto fail_transaction;

            if(!can_open_inode_locked(ip, omode))
              goto fail_inode;

            fd = alloc_open_file(&f);
            if(fd < 0)
              goto fail_inode;

            init_open_file(f, ip, omode);

            if((omode & O_TRUNC) && ip->type == T_FILE)
              itrunc(ip);

            iunlock(ip);
            end_op();
            return fd;

          fail_inode:
            iunlockput(ip);
          fail_transaction:
            end_op();
            return -1;
          }
          '''

          old_sys_symlink = '''uint64
          sys_symlink(void) {

            char target[MAXPATH], path[MAXPATH];;
            struct inode *ip;

            if(argstr(0, target, MAXPATH) < 0|| argstr(1, path, MAXPATH) < 0) {
              return -1;
            }

            begin_op();

            if ((ip = create(path, T_SYMLINK, 0, 0)) == 0){
              end_op();
              return -1;
            }
            int len = strlen(target);
            // write target path len
            if(writei(ip, 0, (uint64)&len, 0, sizeof(len)) < sizeof(len)) {
              iunlockput(ip);
              end_op();
              return -1;
            }
            // write target path
            if(writei(ip, 0, (uint64)target, sizeof(len), len + 1) < 0) {
              iunlockput(ip);
              end_op();
              return -1;
            }

            iunlockput(ip);
            end_op();

            return 0;
          }
          '''

          new_sys_symlink = '''// Caller must hold ip's inode lock.
          static int
          write_symlink_target_locked(struct inode *ip, char *target)
          {
            int len = strlen(target);

            if(writei(ip, 0, (uint64)&len, 0, sizeof(len)) < sizeof(len))
              return -1;
            if(writei(ip, 0, (uint64)target, sizeof(len), len + 1) < 0)
              return -1;

            return 0;
          }

          uint64
          sys_symlink(void)
          {
            char target[MAXPATH], path[MAXPATH];
            struct inode *ip;
            int result;

            if(argstr(0, target, MAXPATH) < 0 ||
               argstr(1, path, MAXPATH) < 0)
              return -1;

            begin_op();

            ip = create(path, T_SYMLINK, 0, 0);
            if(ip == 0){
              end_op();
              return -1;
            }

            result = write_symlink_target_locked(ip, target);

            iunlockput(ip);
            end_op();
            return result;
          }
          '''

          old_begin_op = '''// called at the start of each FS system call.
          void
          begin_op(void)
          {
            acquire(&log.lock);
            while(1){
              if(log.committing){
                sleep(&log, &log.lock);
              } else if(log.lh.n + (log.outstanding+1)*MAXOPBLOCKS > LOGSIZE){
                // this op might exhaust log space; wait for commit.
                sleep(&log, &log.lock);
              } else {
                log.outstanding += 1;
                release(&log.lock);
                break;
              }
            }
          }
          '''

          new_begin_op = '''// Caller must hold log.lock.
          static int
          log_has_space_for_new_op_locked(void)
          {
            int reserved;

            reserved = log.lh.n + (log.outstanding + 1) * MAXOPBLOCKS;
            return reserved <= LOGSIZE;
          }

          // called at the start of each FS system call.
          void
          begin_op(void)
          {
            acquire(&log.lock);

            while(log.committing || !log_has_space_for_new_op_locked())
              sleep(&log, &log.lock);

            log.outstanding += 1;
            release(&log.lock);
          }
          '''

          old_end_op = '''// called at the end of each FS system call.
          // commits if this was the last outstanding operation.
          void
          end_op(void)
          {
            int do_commit = 0;

            acquire(&log.lock);
            log.outstanding -= 1;
            if(log.committing)
              panic("log.committing");
            if(log.outstanding == 0){
              do_commit = 1;
              log.committing = 1;
            } else {
              // begin_op() may be waiting for log space,
              // and decrementing log.outstanding has decreased
              // the amount of reserved space.
              wakeup(&log);
            }
            release(&log.lock);

            if(do_commit){
              // call commit w/o holding locks, since not allowed
              // to sleep with locks.
              commit();
              acquire(&log.lock);
              log.committing = 0;
              wakeup(&log);
              release(&log.lock);
            }
          }
          '''

          new_end_op = '''// called at the end of each FS system call.
          // commits if this was the last outstanding operation.
          void
          end_op(void)
          {
            acquire(&log.lock);
            log.outstanding -= 1;

            if(log.committing)
              panic("log.committing");

            if(log.outstanding != 0){
              // A waiting begin_op() may now fit in the reserved log space.
              wakeup(&log);
              release(&log.lock);
              return;
            }

            // Block new operations before dropping log.lock for disk I/O.
            log.committing = 1;
            release(&log.lock);

            commit();

            acquire(&log.lock);
            log.committing = 0;
            wakeup(&log);
            release(&log.lock);
          }
          '''

          replace_once("kernel/sysfile.c", old_sys_open, new_sys_open)
          replace_once("kernel/sysfile.c", old_sys_symlink, new_sys_symlink)
          replace_once("kernel/log.c", old_begin_op, new_begin_op)
          replace_once("kernel/log.c", old_end_op, new_end_op)
          PY

      - name: Install xv6 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu qemu-system-misc

      - name: Build xv6
        run: |
          make clean
          make

      - name: Run symlink tests
        shell: bash
        run: |
          set +e
          timeout 90s bash -c 'printf "symlinktest\n" | make qemu' > /tmp/symlinktest.log 2>&1
          status=$?
          set -e
          cat /tmp/symlinktest.log
          grep -q "test symlinks: ok" /tmp/symlinktest.log
          grep -q "test concurrent symlinks: ok" /tmp/symlinktest.log
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            exit "$status"
          fi

      - name: Commit verified refactor
        shell: bash
        run: |
          rm .github/workflows/refactor-fs-readability.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: clarify fs syscall and log flow (#40)"
          git push origin HEAD:concept/40-fs-call-log-readability
