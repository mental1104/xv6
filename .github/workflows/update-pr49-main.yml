name: Temporary merge main into PR 49

on:
  push:
    branches:
      - concept/47-xv6-job-control-shell
    paths:
      - .github/workflows/update-pr49-main.yml

permissions:
  contents: write

jobs:
  merge-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: concept/47-xv6-job-control-shell
          fetch-depth: 0

      - name: Merge latest main and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 使用真实 merge 保留主线历史；冲突块优先保留功能分支实现，后续由 CI 验证兼容性。
          git fetch origin main
          git merge --no-edit -X ours origin/main

          # 临时工作流只负责本次反合，不进入最终 PR diff。
          git rm .github/workflows/update-pr49-main.yml
          git commit -m "chore: remove temporary main merge workflow"
          git push origin HEAD:concept/47-xv6-job-control-shell
