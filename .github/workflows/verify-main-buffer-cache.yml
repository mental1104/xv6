name: Verify main buffer cache

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main refactor
        uses: actions/checkout@v4

      - name: Install RISC-V toolchain and QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu qemu-system-misc expect

      - name: Build
        run: |
          make clean
          make -j2

      - name: Run focused filesystem tests with isolated images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p focused-logs

          run_one() {
            local cpus="$1"
            local test_name="$2"
            local log="focused-logs/cpus${cpus}-${test_name}.log"

            rm -f fs.img
            make fs.img >/dev/null

            TEST_NAME="$test_name" CPUS_VALUE="$cpus" expect <<'EOF' | tee "$log"
          set timeout 180
          set test_name $env(TEST_NAME)
          set cpus $env(CPUS_VALUE)

          if {$cpus eq "3"} {
            spawn make qemu
          } else {
            spawn make qemu CPUS=$cpus
          }

          expect "$ "
          send "usertests $test_name\r"
          expect {
            "ALL TESTS PASSED" {
              send "\001x"
              expect eof
              exit 0
            }
            "SOME TESTS FAILED" {
              send "\001x"
              expect eof
              exit 1
            }
            timeout {
              send "\001x"
              exit 2
            }
            eof { exit 3 }
          }
          EOF
          }

          for test_name in createdelete concreate fourfiles sharedfd bigwrite writebig bigfile bigdir; do
            run_one 3 "$test_name"
          done

          for test_name in concreate fourfiles bigwrite writebig bigfile; do
            run_one 1 "$test_name"
          done

      - name: Run full usertests with a fresh image
        id: full
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          rm -f fs.img
          make fs.img >/dev/null

          expect <<'EOF' | tee full-usertests.log
          set timeout 600
          spawn make qemu
          expect "$ "
          send "usertests\r"
          expect {
            "ALL TESTS PASSED" {
              send "\001x"
              expect eof
              exit 0
            }
            "SOME TESTS FAILED" {
              send "\001x"
              expect eof
              exit 1
            }
            timeout {
              send "\001x"
              exit 2
            }
            eof { exit 3 }
          }
          EOF

      - name: Upload QEMU logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buffer-cache-verification-logs
          path: |
            focused-logs/
            full-usertests.log

      - name: Require full regression success
        run: grep -q "ALL TESTS PASSED" full-usertests.log
