name: Verify main buffer cache

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: verify-main-buffer-cache-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main refactor
        uses: actions/checkout@v4

      - name: Install RISC-V toolchain and QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu qemu-system-misc expect

      - name: Build current main
        run: |
          make clean
          make -j2

      - name: Run focused filesystem tests with isolated images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p focused-logs

          run_one() {
            local cpus="$1"
            local test_name="$2"
            local log="focused-logs/cpus${cpus}-${test_name}.log"

            rm -f fs.img
            make fs.img >/dev/null

            TEST_NAME="$test_name" CPUS_VALUE="$cpus" expect <<'EOF' | tee "$log"
          set timeout 120
          set test_name $env(TEST_NAME)
          set cpus $env(CPUS_VALUE)

          if {$cpus eq "3"} {
            spawn make qemu
          } else {
            spawn make qemu CPUS=$cpus
          }

          expect "$ "
          send "usertests $test_name\r"
          expect {
            "ALL TESTS PASSED" {
              send "\001x"
              expect eof
              exit 0
            }
            "SOME TESTS FAILED" {
              send "\001x"
              expect eof
              exit 1
            }
            "panic:" {
              send "\001x"
              expect eof
              exit 1
            }
            timeout {
              send "\001x"
              exit 2
            }
            eof { exit 3 }
          }
          EOF
          }

          for test_name in concreate fourfiles sharedfd bigwrite; do
            run_one 3 "$test_name"
          done

          for test_name in concreate fourfiles bigwrite; do
            run_one 1 "$test_name"
          done

      - name: Run stressfs with three CPUs
        shell: bash
        run: |
          set -euo pipefail
          rm -f fs.img
          make fs.img >/dev/null

          expect <<'EOF' | tee stressfs-cpus3.log
          set timeout 120
          spawn make qemu
          expect "$ "
          send "stressfs\r"
          expect {
            "$ " {
              send "\001x"
              expect eof
              exit 0
            }
            "panic:" {
              send "\001x"
              expect eof
              exit 1
            }
            timeout {
              send "\001x"
              exit 2
            }
            eof { exit 3 }
          }
          EOF
          grep -q "stressfs starting" stressfs-cpus3.log

      - name: Confirm writebig capacity failure predates refactor
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p capacity-logs

          probe_writebig() {
            local repo_dir="$1"
            local label="$2"

            (
              cd "$repo_dir"
              rm -f fs.img
              make fs.img >/dev/null

              expect <<'EOF' | tee "$GITHUB_WORKSPACE/capacity-logs/${label}.log"
          set timeout 120
          spawn make qemu
          expect "$ "
          send "usertests writebig\r"
          expect {
            "panic: balloc: out of blocks" {
              send "\001x"
              expect eof
              exit 0
            }
            "ALL TESTS PASSED" {
              send "\001x"
              expect eof
              exit 1
            }
            timeout {
              send "\001x"
              exit 2
            }
            eof { exit 3 }
          }
          EOF
            )
          }

          probe_writebig "$GITHUB_WORKSPACE" current-main

          git fetch --depth=1 origin eabe1f7ffe079df54f56339678d3ac00a09164c0
          git worktree add /tmp/xv6-before-refactor FETCH_HEAD
          (
            cd /tmp/xv6-before-refactor
            make clean
            make -j2
          )
          probe_writebig /tmp/xv6-before-refactor before-refactor

          grep -q "panic: balloc: out of blocks" capacity-logs/current-main.log
          grep -q "panic: balloc: out of blocks" capacity-logs/before-refactor.log

      - name: Upload QEMU logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buffer-cache-verification-logs
          path: |
            focused-logs/
            stressfs-cpus3.log
            capacity-logs/
