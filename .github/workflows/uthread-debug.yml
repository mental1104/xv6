name: uthread debug

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: uthread-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lab7:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu \
            qemu-system-misc \
            python3-pexpect

      - name: Build xv6
        run: |
          make clean >/dev/null
          make -j2 >uthread-build.log 2>&1

      - name: Run Lab7 with CPUS=3
        id: cpus3
        continue-on-error: true
        run: |
          set -o pipefail
          make test-suite SUITE=lab7-thread CPUS=3 2>&1 | tee uthread-cpus3.log

      - name: Run Lab7 with CPUS=1
        id: cpus1
        continue-on-error: true
        run: |
          set -o pipefail
          make test-suite SUITE=lab7-thread CPUS=1 2>&1 | tee uthread-cpus1.log

      - name: Upload uthread diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uthread-debug-${{ github.run_id }}
          path: |
            uthread-build.log
            uthread-cpus3.log
            uthread-cpus1.log
            test-results/
          if-no-files-found: warn

      - name: Verify both configurations
        if: always()
        run: |
          test "${{ steps.cpus3.outcome }}" = success
          test "${{ steps.cpus1.outcome }}" = success
