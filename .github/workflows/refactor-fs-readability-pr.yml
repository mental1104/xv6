name: Refactor FS readability on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refactor-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply focused refactor
        run: python3 .github/refactor_fs.py

      - name: Install xv6 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu qemu-system-misc expect

      - name: Build xv6
        run: |
          make clean
          make

      - name: Run symlink tests
        shell: bash
        run: |
          expect <<'EOF'
          set timeout 120
          spawn make qemu
          expect -re {[$] $}
          send "symlinktest\r"
          expect "test symlinks: ok"
          expect "test concurrent symlinks: ok"
          send "\001x"
          expect eof
          EOF

      - name: Commit verified refactor
        shell: bash
        run: |
          rm .github/refactor_fs.py
          rm .github/workflows/refactor-fs-readability.yml
          rm .github/workflows/refactor-fs-readability-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: clarify fs syscall and log flow (#40)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
