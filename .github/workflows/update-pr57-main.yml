name: Temporary merge main into PR 57

on:
  push:
    branches:
      - concept/50-minimal-scheduler-family
    paths:
      - .github/workflows/update-pr57-main.yml

permissions:
  contents: write

jobs:
  merge-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: concept/50-minimal-scheduler-family
          fetch-depth: 0

      - name: Merge latest main and resolve remaining conflicts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          # 普通内容冲突优先保留调度分支；删除或重命名冲突再逐项选择仍存在的一侧。
          if ! git merge --no-commit -X ours origin/main; then
            while IFS= read -r path; do
              if git checkout --ours -- "$path" 2>/dev/null; then
                git add -- "$path"
              elif git checkout --theirs -- "$path" 2>/dev/null; then
                git add -- "$path"
              else
                git rm -f --ignore-unmatch -- "$path"
              fi
            done < <(git diff --name-only --diff-filter=U)
          fi

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved merge conflicts remain:" >&2
            git diff --name-only --diff-filter=U >&2
            exit 1
          fi

          git commit --no-edit

          # 临时工作流只负责本次反合，不进入最终 PR diff。
          git rm .github/workflows/update-pr57-main.yml
          git commit -m "chore: remove temporary main merge workflow"
          git push origin HEAD:concept/50-minimal-scheduler-family
