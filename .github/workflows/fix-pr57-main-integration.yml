name: Temporary fix PR 57 main integration

on:
  push:
    branches:
      - concept/50-minimal-scheduler-family
    paths:
      - .github/workflows/fix-pr57-main-integration.yml

permissions:
  contents: write

jobs:
  fix-integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: concept/50-minimal-scheduler-family
          fetch-depth: 0

      - name: Reapply scheduler changes on latest main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          python3 -m py_compile tools/pr57_reintegrate.py
          python3 tools/pr57_reintegrate.py

      - name: Build integrated RR policy
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu
          make clean
          make test-rbtree
          make -j2 SCHED_POLICY=rr
          python3 -m py_compile tests/scheduler_smoke.py tests/run.py tests/test_runner.py

      - name: Commit fixes and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git commit -m "fix: preserve main build test and syscall invariants"
          git rm .github/workflows/fix-pr57-main-integration.yml tools/pr57_reintegrate.py
          git commit -m "chore: remove temporary PR 57 integration tooling"
          git push origin HEAD:concept/50-minimal-scheduler-family
