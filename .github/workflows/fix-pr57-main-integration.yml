name: Temporary fix PR 57 main integration

on:
  push:
    branches:
      - concept/50-minimal-scheduler-family
    paths:
      - .github/workflows/fix-pr57-main-integration.yml

permissions:
  contents: write

jobs:
  fix-integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: concept/50-minimal-scheduler-family
          fetch-depth: 0

      - name: Reapply scheduler changes on latest main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          python3 - <<'PY'
          """以最新 main 文件为骨架重新应用调度功能，避免保留反合时的旧版覆盖。"""

          from pathlib import Path
          import subprocess

          ORIGINAL_HEAD = "25f606bdd45f89594c2f5800815b5ec3bdc28e5e"


          def git_file(ref: str, path: str) -> str:
              """读取指定 Git ref 下的 UTF-8 文件。

              Args:
                  ref: Git 引用，例如 origin/main 或固定提交 SHA。
                  path: 仓库内相对路径。

              Returns:
                  文件的 UTF-8 文本。
              """
              return subprocess.check_output(
                  ["git", "show", f"{ref}:{path}"], text=True
              )


          def main_file(path: str) -> str:
              """读取最新 origin/main 中的文件文本。"""
              return git_file("origin/main", path)


          # 1. 以主线 Makefile 为基础接入调度对象、策略参数和测试入口。
          makefile = main_file("Makefile")
          makefile = makefile.replace(
              "  $K/proc.o \\\n",
              "  $K/proc.o \\\n  $K/sched.o \\\n  $K/rbtree.o \\\n",
              1,
          )
          policy_block = r'''SCHED_POLICY ?= rr
          SCHED_POLICY_rr := 0
          SCHED_POLICY_fifo := 1
          SCHED_POLICY_sjf := 2
          SCHED_POLICY_stcf := 3
          SCHED_POLICY_mlfq := 4
          SCHED_POLICY_cfs := 5
          SCHED_POLICY_ID := $(SCHED_POLICY_$(SCHED_POLICY))
          ifeq ($(strip $(SCHED_POLICY_ID)),)
          $(error unsupported SCHED_POLICY='$(SCHED_POLICY)'; use rr, fifo, sjf, stcf, mlfq, or cfs)
          endif
          CFLAGS += -DSCHED_POLICY=$(SCHED_POLICY_ID)

          # 保留 proc.c 的历史入口作为可链接后备，由 sched.c 提供公开调度入口。
          $K/proc.o: CFLAGS += -Dprocinit=legacy_procinit -Dscheduler=legacy_scheduler -Dyield=legacy_yield
          $K/trap.o: CFLAGS += -Dyield=sched_timer_yield

          '''
          makefile = makefile.replace(
              "CFLAGS += $(shell $(CC) -fno-stack-protector -E -x c /dev/null >/dev/null 2>&1 && echo -fno-stack-protector)\n\n",
              "CFLAGS += $(shell $(CC) -fno-stack-protector -E -x c /dev/null >/dev/null 2>&1 && echo -fno-stack-protector)\n\n"
              + policy_block,
              1,
          )
          makefile = makefile.replace(
              "\t$U/_xv6test\n",
              "\t$U/_xv6test\\\n\t$U/_schedtest\n",
              1,
          )
          makefile = makefile.replace(
              "\t\tmkfs/mkfs .gdbinit $U/usys.S $(UPROGS) $(UEXTRA) ph barrier\n",
              "\t\tmkfs/mkfs .gdbinit $U/usys.S $(UPROGS) $(UEXTRA) ph barrier rbtree_test\n",
              1,
          )
          rbtree_target = r'''test-rbtree:
          	gcc -Wall -Werror -I. -o rbtree_test $H/rbtree_test.c kernel/rbtree.c
          	./rbtree_test

          '''
          makefile = makefile.replace(
              "# 默认开发入口：先自测 Python runner，再由同一 Python 入口启动 QEMU\n",
              rbtree_target
              + "# 默认开发入口：先自测 Python runner，再由同一 Python 入口启动 QEMU\n",
              1,
          )
          makefile = makefile.replace("test-unit:\n", "test-unit: test-rbtree\n", 1)
          makefile = makefile.replace(
              ".PHONY: clean qemu qemu-gdb gdb ph barrier test test-unit test-grader \\\n",
              ".PHONY: clean qemu qemu-gdb gdb ph barrier test-rbtree test test-unit test-grader \\\n",
              1,
          )
          Path("Makefile").write_text(makefile, encoding="utf-8")

          # 主线已把测试源码迁入 tests/guest 和 tests/host，恢复原 PR 内容到新目录。
          Path("tests/guest/schedtest.c").write_text(
              git_file(ORIGINAL_HEAD, "user/schedtest.c"), encoding="utf-8"
          )
          Path("tests/host/rbtree_test.c").write_text(
              git_file(ORIGINAL_HEAD, "notxv6/rbtree_test.c"), encoding="utf-8"
          )
          Path("user/schedtest.c").unlink(missing_ok=True)

          # 2. 保留主线系统调用 29-31，把调度控制接口分配到 32-34。
          syscall_h = main_file("kernel/syscall.h")
          if not syscall_h.endswith("\n"):
              syscall_h += "\n"
          syscall_h += (
              "#define SYS_sched_set_hint   32\n"
              "#define SYS_sched_set_weight 33\n"
              "#define SYS_sched_get_stats  34\n"
          )
          Path("kernel/syscall.h").write_text(syscall_h, encoding="utf-8")

          syscall_c = main_file("kernel/syscall.c")
          syscall_c = syscall_c.replace(
              "extern uint64 sys_vaquery(void);\n",
              "extern uint64 sys_vaquery(void);\n"
              "extern uint64 sys_sched_set_hint(void);\n"
              "extern uint64 sys_sched_set_weight(void);\n"
              "extern uint64 sys_sched_get_stats(void);\n",
              1,
          )
          syscall_c = syscall_c.replace(
              "[SYS_vaquery] sys_vaquery,\n",
              "[SYS_vaquery] sys_vaquery,\n"
              "[SYS_sched_set_hint]   sys_sched_set_hint,\n"
              "[SYS_sched_set_weight] sys_sched_set_weight,\n"
              "[SYS_sched_get_stats]  sys_sched_get_stats,\n",
              1,
          )
          syscall_c = syscall_c.replace("(1U << num)", "(1ULL << num)", 1)
          Path("kernel/syscall.c").write_text(syscall_c, encoding="utf-8")

          syscall_names = main_file("kernel/syscall_names.h")
          syscall_names = syscall_names.replace(
              "[SYS_memsnapshot] = \"memsnapshot\",\n",
              "[SYS_memsnapshot] = \"memsnapshot\",\n"
              "[SYS_vaquery]    = \"vaquery\",\n"
              "[SYS_sched_set_hint]   = \"sched_set_hint\",\n"
              "[SYS_sched_set_weight] = \"sched_set_weight\",\n"
              "[SYS_sched_get_stats]  = \"sched_get_stats\",\n",
              1,
          )
          Path("kernel/syscall_names.h").write_text(
              syscall_names, encoding="utf-8"
          )

          # 3. 保留主线 proc.h 注释与字段，只嵌入调度实体并扩展 trace 掩码。
          proc_h = main_file("kernel/proc.h")
          proc_h = '#include "rbtree.h"\n\nstruct proc;\n\n' + proc_h
          sched_entity = r'''// 调度实体内嵌于 proc，调度器和中断路径无需动态分配队列节点。
          struct sched_entity {
            struct proc *prev;
            struct proc *next;
            struct rb_node rb;
            int on_rq;
            int reserved;
            int generation;
            int weight;
            int mlfq_level;
            int force_preempt;
            uint64 mlfq_used;
            uint64 mlfq_epoch;
            uint64 enqueue_seq;
            uint64 runtime_ticks;
            uint64 dispatches;
            uint64 burst_hint;
            uint64 remaining_hint;
            uint64 vruntime;
            uint64 slice_ticks;
          };

          '''
          proc_h = proc_h.replace(
              "// Per-process state\nstruct proc {\n",
              sched_entity + "// Per-process state\nstruct proc {\n",
              1,
          )
          proc_h = proc_h.replace(
              "  int pid;                     // Process ID\n",
              "  int pid;                     // Process ID\n"
              "  struct sched_entity sched;   // Policy-owned scheduling state.\n",
              1,
          )
          proc_h = proc_h.replace("  int mask;\n", "  uint64 mask;\n", 1)
          Path("kernel/proc.h").write_text(proc_h, encoding="utf-8")

          # 4. 以主线 sysproc.c 为基础追加调度控制接口，并让 trace 接收 64 位掩码。
          sysproc_c = main_file("kernel/sysproc.c")
          sysproc_c = sysproc_c.replace(
              '#include "sysinfo.h"\n',
              '#include "sysinfo.h"\n#include "sched.h"\n#include "schedstat.h"\n',
              1,
          )
          old_trace = '''uint64
          sys_trace(void)
          {
            int mask;
            if(argint(0, &mask) < 0)
              return -1;

            myproc()->mask = mask;
            return 0;
          }
          '''
          new_trace = '''uint64
          sys_trace(void)
          {
            uint64 mask;
            if(argaddr(0, &mask) < 0)
              return -1;

            myproc()->mask = mask;
            return 0;
          }
          '''
          sysproc_c = sysproc_c.replace(old_trace, new_trace, 1)
          sched_syscalls = r'''/**
           * 设置当前进程供 SJF/STCF 教学策略使用的 CPU burst hint。
           *
           * @return 参数合法时返回 0，否则返回 -1。
           */
          uint64
          sys_sched_set_hint(void)
          {
            int ticks_hint;
            if(argint(0, &ticks_hint) < 0)
              return -1;
            return sched_set_hint(ticks_hint);
          }

          /**
           * 设置当前进程供 Minimal CFS 使用的整数权重。
           *
           * @return 参数合法时返回 0，否则返回 -1。
           */
          uint64
          sys_sched_set_weight(void)
          {
            int weight;
            if(argint(0, &weight) < 0)
              return -1;
            return sched_set_weight(weight);
          }

          /**
           * 将当前进程的调度统计复制到用户地址。
           *
           * @return 复制成功时返回 0，地址或状态无效时返回 -1。
           */
          uint64
          sys_sched_get_stats(void)
          {
            uint64 addr;
            struct sched_stats stats;
            struct proc *p = myproc();

            if(argaddr(0, &addr) < 0)
              return -1;
            if(sched_get_stats(&stats) < 0)
              return -1;
            if(copyout(p->pagetable, addr, (char *)&stats, sizeof(stats)) < 0)
              return -1;
            return 0;
          }

          '''
          sysproc_c = sysproc_c.replace("/**\n * 显式打印当前系统调用路径", sched_syscalls + "/**\n * 显式打印当前系统调用路径", 1)
          Path("kernel/sysproc.c").write_text(sysproc_c, encoding="utf-8")

          # 5. 保留主线用户 ABI，并追加调度接口和 64 位 trace 掩码。
          user_h = main_file("user/user.h")
          user_h = user_h.replace(
              "struct memviz_va_query;\n",
              "struct memviz_va_query;\nstruct sched_stats;\n",
              1,
          )
          user_h = user_h.replace("int trace(int);\n", "int trace(uint64);\n", 1)
          user_h = user_h.replace(
              "int vaquery(uint64 va, struct memviz_va_query *query);\n",
              "int vaquery(uint64 va, struct memviz_va_query *query);\n"
              "int sched_set_hint(int ticks);\n"
              "int sched_set_weight(int weight);\n"
              "int sched_get_stats(struct sched_stats *stats);\n",
              1,
          )
          Path("user/user.h").write_text(user_h, encoding="utf-8")

          usys = main_file("user/usys.pl")
          usys = usys.replace(
              'entry("vaquery");\n',
              'entry("vaquery");\n'
              'entry("sched_set_hint");\n'
              'entry("sched_set_weight");\n'
              'entry("sched_get_stats");\n',
              1,
          )
          Path("user/usys.pl").write_text(usys, encoding="utf-8")

          # 6. 让 trace 名称解析器真正支持 32 号以上系统调用。
          tracemask_h = main_file("user/tracemask.h")
          tracemask_h = tracemask_h.replace(
              "#define XV6_USER_TRACEMASK_H\n",
              "#define XV6_USER_TRACEMASK_H\n\n#include \"kernel/types.h\"\n",
              1,
          )
          tracemask_h = tracemask_h.replace(
              "int trace_parse_mask(const char *spec, int *mask);",
              "int trace_parse_mask(const char *spec, uint64 *mask);",
              1,
          )
          Path("user/tracemask.h").write_text(tracemask_h, encoding="utf-8")

          tracemask_c = main_file("user/tracemask.c")
          tracemask_c = tracemask_c.replace(
              "parse_decimal(const char *spec, int *mask)",
              "parse_decimal(const char *spec, uint64 *mask)",
              1,
          )
          tracemask_c = tracemask_c.replace(
              "trace_parse_mask(const char *spec, int *mask)",
              "trace_parse_mask(const char *spec, uint64 *mask)",
              1,
          )
          tracemask_c = tracemask_c.replace(
              "unsigned int result = 0;",
              "uint64 result = 0;",
              1,
          )
          tracemask_c = tracemask_c.replace("1U << syscall_number", "1ULL << syscall_number")
          Path("user/tracemask.c").write_text(tracemask_c, encoding="utf-8")

          trace_c = main_file("user/trace.c")
          trace_c = trace_c.replace(
              "  int mask;           // 传给现有 trace 系统调用的整数位掩码。\n",
              "  uint64 mask;        // 传给 trace 系统调用的 64 位位掩码。\n",
              1,
          )
          Path("user/trace.c").write_text(trace_c, encoding="utf-8")

          tracemask_test = main_file("tests/guest/tracemasktest.c")
          tracemask_test = tracemask_test.replace("int expected_mask;", "uint64 expected_mask;")
          tracemask_test = tracemask_test.replace("1U <<", "1ULL <<")
          tracemask_test = tracemask_test.replace(
              "    int mask = -1;",
              "    uint64 mask = ~(uint64)0;",
          )
          tracemask_test = tracemask_test.replace(
              "    int mask = 0;",
              "    uint64 mask = 0;",
          )
          tracemask_test = tracemask_test.replace(
              "mask != (int)(1ULL << syscall_number)",
              "mask != (1ULL << syscall_number)",
          )
          tracemask_test = tracemask_test.replace(
              'printf("tracemasktest: %s: status %d mask %d\\n",\n',
              'printf("tracemasktest: %s: status %d mask %p\\n",\n',
          )
          tracemask_test = tracemask_test.replace(
              'printf("tracemasktest: syscall %s: status %d mask %d\\n",\n',
              'printf("tracemasktest: syscall %s: status %d mask %p\\n",\n',
          )
          Path("tests/guest/tracemasktest.c").write_text(
              tracemask_test, encoding="utf-8"
          )

          scheduler_ci = Path(".github/workflows/scheduler-ci.yml").read_text(encoding="utf-8")
          scheduler_ci = scheduler_ci.replace(
              "types: [opened, synchronize, reopened]",
              "types: [opened, synchronize, reopened, ready_for_review]",
              1,
          )
          Path(".github/workflows/scheduler-ci.yml").write_text(
              scheduler_ci, encoding="utf-8"
          )
          PY

      - name: Build integrated RR policy
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu
          make clean
          make test-rbtree
          make -j2 SCHED_POLICY=rr
          python3 -m py_compile tests/scheduler_smoke.py tests/run.py tests/test_runner.py

      - name: Commit fix and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git commit -m "fix: preserve main build test and syscall invariants"
          git rm .github/workflows/fix-pr57-main-integration.yml
          git commit -m "chore: remove temporary PR 57 integration workflow"
          git push origin HEAD:concept/50-minimal-scheduler-family
