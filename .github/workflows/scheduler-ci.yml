name: Scheduler family CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  reintegrate:
    if: github.event.pull_request.head.ref == 'concept/50-minimal-scheduler-family'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: concept/50-minimal-scheduler-family
          fetch-depth: 0

      - name: Reapply scheduler changes on latest main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          python3 -m py_compile tools/pr57_reintegrate.py
          python3 tools/pr57_reintegrate.py

      - name: Commit code fixes and push
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .github/workflows/scheduler-ci.yml
          git add Makefile kernel tests user
          git rm tools/pr57_reintegrate.py
          git commit -m "fix: preserve main build test and syscall invariants"
          git push origin HEAD:concept/50-minimal-scheduler-family
