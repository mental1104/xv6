name: Scheduler family CI

on:
  push:
    branches:
      - "concept/50-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduler-ci-${{ github.ref }}-${{ matrix.policy }}
  cancel-in-progress: true

jobs:
  scheduler:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        policy: [rr, fifo, sjf, stcf, mlfq, cfs]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu \
            qemu-system-misc \
            python3-pexpect

      - name: Test red-black tree
        run: make test-rbtree

      - name: Build policy
        run: |
          make clean
          make -j2 SCHED_POLICY=${{ matrix.policy }}

      - name: Run scheduler smoke test
        run: python3 tests/scheduler_smoke.py --policy ${{ matrix.policy }} --cpus 1
