name: Scheduler family CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scheduler-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-prompt-fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply staged prompt patch
        run: |
          if [[ ! -f user/sh_prompt_atomic.patch ]]; then
            exit 0
          fi
          git apply user/sh_prompt_atomic.patch
          rm user/sh_prompt_atomic.patch
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add user/sh.c user/sh_prompt_atomic.patch
          git commit -m 'fix: 原子输出完整 Shell 提示符'
          git push origin HEAD:${GITHUB_HEAD_REF}

  scheduler:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        policy: [rr, fifo, sjf, stcf, mlfq, cfs]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu \
            qemu-system-misc

      - name: Build scheduler smoke runner
        run: |
          gcc -Wall -Werror -std=c11 -D_POSIX_C_SOURCE=200809L \
            -o scheduler_smoke tests/host/scheduler_smoke.c

      - name: Test red-black tree
        run: make test-rbtree

      - name: Build policy
        run: |
          make clean
          make -j2 SCHED_POLICY=${{ matrix.policy }}

      - name: Run single-CPU scheduler behavior test
        run: ./scheduler_smoke --policy ${{ matrix.policy }} --cpus 1

  smp-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        policy: [rr, mlfq, cfs]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu \
            qemu-system-misc

      - name: Build scheduler smoke runner
        run: |
          gcc -Wall -Werror -std=c11 -D_POSIX_C_SOURCE=200809L \
            -o scheduler_smoke tests/host/scheduler_smoke.c

      - name: Build policy
        run: |
          make clean
          make -j2 SCHED_POLICY=${{ matrix.policy }}

      - name: Run three-CPU scheduler smoke test
        run: ./scheduler_smoke --policy ${{ matrix.policy }} --cpus 3

  regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu \
            qemu-system-misc \
            python3-pexpect

      - name: Run runner unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Build default RR policy
        run: |
          make clean
          make -j2 SCHED_POLICY=rr

      - name: Run shell interaction regression
        run: python3 tests/shell_history_interactive.py --cpus 3

      - name: Run pull-request regression suites
        run: python3 tests/run.py --suite pr --cpus 3

      - name: Run complete usertests
        run: python3 tests/run_usertests.py --cpus 3

      - name: Run reparent cleanup single-core
        run: |
          make clean
          make -j2 CPUS=1 SCHED_POLICY=rr
          python3 tests/run_usertests.py \
            --cpus 1 \
            --case reparent2 \
            --case reparent

      - name: Upload regression logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-regression-${{ github.run_id }}
          path: |
            test-results/
            user/sh.c
          if-no-files-found: ignore
