name: Export repository bundle

on:
  pull_request:
    branches:
      - pristine

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/export-xv6-repo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all branches
        run: git fetch --all --prune
      - name: Create repository bundle
        run: git bundle create xv6.bundle --all
      - uses: actions/upload-artifact@v4
        with:
          name: xv6-repository-bundle
          path: xv6.bundle
          retention-days: 1
