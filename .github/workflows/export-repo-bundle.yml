name: Validate integrated xv6 main

on:
  pull_request:
    branches:
      - pristine

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'agent/export-xv6-repo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Repair and checksum integration bundle
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p0 = Path('integration-bundle/part00')
          text = p0.read_text()
          assert len(text) == 4999
          p0.write_text(text[:827] + 's' + text[827:])

          p8 = Path('integration-bundle/part08')
          text = p8.read_text()
          bad = 'zc/B5h8qMmL4oKz7QQDAcK2HcW2xAF4nOtR/K2wYTfv'
          good = 'zc/B5h8qMmL4oKz7QQDAeUNHcxso2p4nOtR/K2wYTfv'
          assert text.count(bad) == 1
          p8.write_text(text.replace(bad, good))
          PY
          cat integration-bundle/part* | base64 --decode > /tmp/xv6-main.bundle
          echo 'd039dc1f367f9d6e3140708f0cc066d2e5ee0aa1b67d4dd36254211efc006495  /tmp/xv6-main.bundle' | sha256sum --check

      - name: Verify Git bundle
        run: git bundle verify /tmp/xv6-main.bundle

      - name: Import integrated commit history
        run: |
          git bundle unbundle /tmp/xv6-main.bundle
          git cat-file -e '221fb4fc8353a080adc2e1a1a235e7bf02db34f5^{commit}'
          git update-ref refs/heads/integrated-main 221fb4fc8353a080adc2e1a1a235e7bf02db34f5
          git reset --hard HEAD
          git checkout integrated-main
          test "$(git rev-parse HEAD)" = '221fb4fc8353a080adc2e1a1a235e7bf02db34f5'

      - name: Make primes pipeline iterative
        run: |
          cat > user/primes.c <<'EOF'
          #include "kernel/types.h"
          #include "kernel/stat.h"
          #include "user/user.h"

          static void
          run_pipeline(int input[2])
          {
            int read_fd = input[0];
            close(input[1]);

            for(;;){
              int prime;
              if(read(read_fd, &prime, sizeof(prime)) != sizeof(prime)){
                close(read_fd);
                exit(0);
              }

              printf("prime %d\n", prime);

              int next[2];
              if(pipe(next) < 0){
                close(read_fd);
                exit(1);
              }

              int pid = fork();
              if(pid < 0){
                close(read_fd);
                close(next[0]);
                close(next[1]);
                exit(1);
              }

              if(pid == 0){
                close(read_fd);
                close(next[1]);
                read_fd = next[0];
                continue;
              }

              close(next[0]);

              int num;
              while(read(read_fd, &num, sizeof(num)) == sizeof(num)){
                if(num % prime != 0)
                  write(next[1], &num, sizeof(num));
              }

              close(read_fd);
              close(next[1]);
              wait(0);
              exit(0);
            }
          }

          int
          main(int argc, char **argv)
          {
            if(argc != 1){
              fprintf(2, "usage: primes\n");
              exit(1);
            }

            int input[2];
            if(pipe(input) < 0)
              exit(1);

            int pid = fork();
            if(pid < 0)
              exit(1);

            if(pid == 0)
              run_pipeline(input);

            close(input[0]);
            for(int i = 2; i <= 35; i++)
              write(input[1], &i, sizeof(i));
            close(input[1]);
            wait(0);
            exit(0);
          }
          EOF
          git config user.name 'ChatGPT'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add user/primes.c
          git commit -m 'fix: make primes pipeline iterative'

      - name: Enable supervisor memory access on modern QEMU
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('kernel/riscv.h')
          text = p.read_text()
          needle = '''static inline void
          w_mepc(uint64 x)
          {
            asm volatile("csrw mepc, %0" : : "r" (x));
          }
          '''
          replacement = needle + '''
          // Physical Memory Protection, required before entering supervisor mode
          // on current RISC-V implementations.
          static inline void
          w_pmpcfg0(uint64 x)
          {
            asm volatile("csrw pmpcfg0, %0" : : "r" (x));
          }

          static inline void
          w_pmpaddr0(uint64 x)
          {
            asm volatile("csrw pmpaddr0, %0" : : "r" (x));
          }
          '''
          assert needle in text
          p.write_text(text.replace(needle, replacement, 1))

          p = Path('kernel/start.c')
          text = p.read_text()
          needle = '''  // disable paging for now.
            w_satp(0);
          '''
          replacement = '''  // disable paging for now.
            w_satp(0);

            // Give supervisor mode access to all physical memory.
            // Newer QEMU versions enforce PMP permissions.
            w_pmpaddr0(0x3fffffffffffffull);
            w_pmpcfg0(0xf);
          '''
          assert needle in text
          p.write_text(text.replace(needle, replacement, 1))
          PY
          git add kernel/riscv.h kernel/start.c
          git commit -m 'fix: allow supervisor memory access on modern QEMU'

      - name: Install RISC-V build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu qemu-system-misc

      - name: Build kernel, filesystem and thread programs
        run: |
          set -e
          {
            make clean
            make TOOLPREFIX=riscv64-linux-gnu-
            make TOOLPREFIX=riscv64-linux-gnu- fs.img
            make ph barrier
          } > /tmp/build.log 2>&1
          cat /tmp/build.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xv6-integration-build-log
          path: /tmp/build.log
          retention-days: 1

      - name: Boot smoke test
        run: |
          {
            sleep 8
            echo 'echo smoke-ok'
            sleep 4
            printf '\001x'
          } | timeout 35s make TOOLPREFIX=riscv64-linux-gnu- qemu > /tmp/qemu.log 2>&1 || true
          cat /tmp/qemu.log
          grep -q 'init: starting sh' /tmp/qemu.log
          grep -q 'smoke-ok' /tmp/qemu.log

      - name: Upload QEMU diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xv6-integration-qemu-log
          path: /tmp/qemu.log
          retention-days: 1

      - name: Publish validated integration branch
        run: git push origin integrated-main:refs/heads/agent/xv6-main-integration --force
