name: Validate integrated xv6 main

on:
  pull_request:
    branches:
      - pristine

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'agent/export-xv6-repo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Repair and checksum integration bundle
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p0 = Path('integration-bundle/part00')
          text = p0.read_text()
          assert len(text) == 4999
          p0.write_text(text[:827] + 's' + text[827:])

          p8 = Path('integration-bundle/part08')
          text = p8.read_text()
          bad = 'zc/B5h8qMmL4oKz7QQDAcK2HcW2xAF4nOtR/K2wYTfv'
          good = 'zc/B5h8qMmL4oKz7QQDAeUNHcxso2p4nOtR/K2wYTfv'
          assert text.count(bad) == 1
          p8.write_text(text.replace(bad, good))
          PY
          cat integration-bundle/part* | base64 --decode > /tmp/xv6-main.bundle
          echo 'd039dc1f367f9d6e3140708f0cc066d2e5ee0aa1b67d4dd36254211efc006495  /tmp/xv6-main.bundle' | sha256sum --check

      - name: Verify Git bundle
        run: git bundle verify /tmp/xv6-main.bundle

      - name: Import integrated commit history
        run: |
          git bundle unbundle /tmp/xv6-main.bundle
          git cat-file -e '221fb4fc8353a080adc2e1a1a235e7bf02db34f5^{commit}'
          git update-ref refs/heads/integrated-main 221fb4fc8353a080adc2e1a1a235e7bf02db34f5
          git checkout integrated-main
          test "$(git rev-parse HEAD)" = '221fb4fc8353a080adc2e1a1a235e7bf02db34f5'

      - name: Install RISC-V build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu qemu-system-misc

      - name: Build kernel, filesystem and thread programs
        run: |
          make clean
          make TOOLPREFIX=riscv64-linux-gnu-
          make TOOLPREFIX=riscv64-linux-gnu- fs.img
          make ph barrier

      - name: Boot smoke test
        run: |
          {
            sleep 3
            echo 'echo smoke-ok'
            sleep 3
            printf '\001x'
          } | timeout 25s make TOOLPREFIX=riscv64-linux-gnu- qemu > /tmp/qemu.log 2>&1 || true
          cat /tmp/qemu.log
          grep -q 'init: starting sh' /tmp/qemu.log
          grep -q 'smoke-ok' /tmp/qemu.log

      - name: Publish validated integration branch
        run: git push origin integrated-main:refs/heads/agent/xv6-main-integration --force
